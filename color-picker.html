<!-- color-picker.html (프로젝트 루트에 위치) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KeyCat Color</title>
  <style>
    body { font-family: system-ui; padding: 16px; background: #1a1a1a; color: #fff; }
    .slider-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; }
    input[type="range"] { width: 100%; }
    .value { float: right; font-size: 12px; color: #aaa; }
    button { width: 100%; padding: 8px; margin-top: 8px; cursor: pointer;
      border: none; border-radius: 4px; font-size: 14px; }
    .btn-ok { background: #FF8C00; color: #fff; }
    .btn-cancel { background: #333; color: #ccc; }
  </style>
</head>
<body>
  <div class="slider-group">
    <label>Hue <span class="value" id="hue-val">0</span></label>
    <input type="range" id="hue" min="0" max="360" value="0" />
  </div>
  <div class="slider-group">
    <label>Saturation <span class="value" id="sat-val">100</span></label>
    <input type="range" id="sat" min="0" max="200" value="100" />
  </div>
  <div class="slider-group">
    <label>Brightness <span class="value" id="bright-val">100</span></label>
    <input type="range" id="bright" min="0" max="200" value="100" />
  </div>
  <button class="btn-ok" id="btn-ok">Apply</button>
  <button class="btn-cancel" id="btn-cancel">Cancel</button>
  <script type="module" src="/src/color-picker.ts"></script>
</body>
</html>
